name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  actions: write

# Cancel superseded runs on PRs (never on tag pushes, which drive releases).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.14.0'
  # The opencode-ai npm package is published in lockstep with the binary, so
  # this pins both the binary and the package. Matches the version the e2e
  # suite targets (see Dockerfile build arg and docs/e2e.md).
  OPENCODE_VERSION: '1.17.8'

jobs:
  ci:
    name: Lint, Type-check and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The full local gate: format:check, lint, typecheck, and unit tests.
      - run: pnpm check

  # E2E runs on a Windows/macOS/Linux matrix because the plugin and its e2e
  # suite must work on every platform opencode supports. Docker (used by the
  # repo's Dockerfile) can only reproduce Linux, so these run natively per OS.
  e2e-tests:
    name: E2E Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install opencode binary
        run: npm install --global opencode-ai@${{ env.OPENCODE_VERSION }}
      # The e2e harness loads the plugin from build/index.js via a file URL.
      - run: pnpm build
      - run: pnpm test:e2e

  # A containerized lane that runs the entire quality gate — format, lint,
  # type-check, unit tests, and the mock-LLM e2e suite — through the repo's
  # multi-stage Dockerfile (its default `ci-output` collector). Docker can only
  # build a Linux container, so this complements the native cross-platform
  # matrix above rather than replacing it: it guards the reproducible,
  # host-tool-free CI path documented in DEVELOPMENT.md ("Running Checks in
  # Docker") and exercises every Dockerfile stage end to end.
  docker:
    name: CI Gate (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build CI gate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ci-output
          build-args: OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}
          outputs: type=local,dest=./ci-output
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publishes to npm (tokenless via OIDC Trusted Publishers) and creates a
  # GitHub release. Only runs on version tags after all CI gates pass.
  #
  # npm Trusted Publisher setup: on npmjs.com, link the package to
  #   repository = ameshkov/opencode-sdd, workflow filename = ci.yml
  release:
    name: Publish & GitHub Release
    needs:
      - ci
      - e2e-tests
      - docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # to create the GitHub release
      id-token: write # to enable npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:   $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # No token needed: npm authenticates via OIDC (Trusted Publishers).
      # Provenance is generated automatically from the id-token permission.
      - name: Publish to npm
        # TODO: Uncomment after making the repo public
        # run: npm publish --provenance --access public
        run: npm publish --access public
      - name: Build npm package tarball
        run: pnpm pack
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: See [CHANGELOG.md](./CHANGELOG.md) for the list of
            changes.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: opencode-sdd-*.tgz
